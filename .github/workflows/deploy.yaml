name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  # Uncomment after committing package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Validate server starts
        run: |
          node server.js &
          SERVER_PID=$!

          echo "Waiting for server..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is up on attempt $i"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process crashed. Check your imports."
              exit 1
            fi
            echo "Attempt $i — waiting 1s..."
            sleep 1
          done

          curl -f http://localhost:3000/health
          kill $SERVER_PID 2>/dev/null || true

      - name: Trigger Render Deploy
        if: success() && env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy..."
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered"
